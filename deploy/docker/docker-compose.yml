name: srnameta

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: srnameta_nginx
    depends_on:
      - srnameta_app_1
      - srnameta_app_2
      - srnameta_app_3
    ports:
      - "${PUBLIC_BIND_ADDR:-0.0.0.0}:${PUBLIC_PORT:-10812}:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  srnameta_app_1:
    build:
      context: .
      dockerfile: Dockerfile.shiny-hostr
      args:
        SHINY_UID: "${SHINY_UID:-1000}"
        SHINY_GID: "${SHINY_GID:-1000}"
    image: srnameta/shiny-hostr:latest
    container_name: srnameta_app_1
    user: "${SHINY_UID:-1000}:${SHINY_GID:-1000}"
    environment:
      APP_DIR: /share/shiny/sRNAmeta
      HOST_R_BIN: /home/shiny/miniconda3/envs/sRNAmeta_web/bin/R
      JOB_ROOT: /public/liuqi/wwwdata/sncRNAbench/results
      SUPPORT_ROOT: /share/shiny/sRNAmeta/support
      SHINY_PORT: 3838
      HOME: /home/shiny
    volumes:
      - "${APP_HOST_PATH:-/share/shiny/sRNAmeta}:/share/shiny/sRNAmeta:rw"
      - "${HOST_R_ENV_PATH:-/home/shiny/miniconda3/envs/sRNAmeta_web}:/home/shiny/miniconda3/envs/sRNAmeta_web:ro"
      - "${JOB_ROOT_HOST_PATH:-/public/liuqi/wwwdata/sncRNAbench/results}:/public/liuqi/wwwdata/sncRNAbench/results:rw"
      - "${REFERENCE_DB_HOST_PATH:-/public/liuqi/wwwdb/sncRNAbench/tRNA}:/public/liuqi/wwwdb/sncRNAbench/tRNA:ro"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3838"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  srnameta_app_2:
    image: srnameta/shiny-hostr:latest
    container_name: srnameta_app_2
    user: "${SHINY_UID:-1000}:${SHINY_GID:-1000}"
    environment:
      APP_DIR: /share/shiny/sRNAmeta
      HOST_R_BIN: /home/shiny/miniconda3/envs/sRNAmeta_web/bin/R
      JOB_ROOT: /public/liuqi/wwwdata/sncRNAbench/results
      SUPPORT_ROOT: /share/shiny/sRNAmeta/support
      SHINY_PORT: 3838
      HOME: /home/shiny
    volumes:
      - "${APP_HOST_PATH:-/share/shiny/sRNAmeta}:/share/shiny/sRNAmeta:rw"
      - "${HOST_R_ENV_PATH:-/home/shiny/miniconda3/envs/sRNAmeta_web}:/home/shiny/miniconda3/envs/sRNAmeta_web:ro"
      - "${JOB_ROOT_HOST_PATH:-/public/liuqi/wwwdata/sncRNAbench/results}:/public/liuqi/wwwdata/sncRNAbench/results:rw"
      - "${REFERENCE_DB_HOST_PATH:-/public/liuqi/wwwdb/sncRNAbench/tRNA}:/public/liuqi/wwwdb/sncRNAbench/tRNA:ro"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3838"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      - srnameta_app_1

  srnameta_app_3:
    image: srnameta/shiny-hostr:latest
    container_name: srnameta_app_3
    user: "${SHINY_UID:-1000}:${SHINY_GID:-1000}"
    environment:
      APP_DIR: /share/shiny/sRNAmeta
      HOST_R_BIN: /home/shiny/miniconda3/envs/sRNAmeta_web/bin/R
      JOB_ROOT: /public/liuqi/wwwdata/sncRNAbench/results
      SUPPORT_ROOT: /share/shiny/sRNAmeta/support
      SHINY_PORT: 3838
      HOME: /home/shiny
    volumes:
      - "${APP_HOST_PATH:-/share/shiny/sRNAmeta}:/share/shiny/sRNAmeta:rw"
      - "${HOST_R_ENV_PATH:-/home/shiny/miniconda3/envs/sRNAmeta_web}:/home/shiny/miniconda3/envs/sRNAmeta_web:ro"
      - "${JOB_ROOT_HOST_PATH:-/public/liuqi/wwwdata/sncRNAbench/results}:/public/liuqi/wwwdata/sncRNAbench/results:rw"
      - "${REFERENCE_DB_HOST_PATH:-/public/liuqi/wwwdb/sncRNAbench/tRNA}:/public/liuqi/wwwdb/sncRNAbench/tRNA:ro"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3838"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      - srnameta_app_1
